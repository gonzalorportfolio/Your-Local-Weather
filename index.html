    <style>h1 {
    text-align: center;
    font-family: 'Oswald', sans-serif;
    text-shadow: 2px 2px 5px black;
    color: white;
}

body {
    background: #47bcff;
    height: 100%;
}

.container {
    margin: 0px;
    padding: 0px;
    height: auto;
    display: flex;
    align-items: center;
    justify-content: center;
}

.mainInterface {
    width: 500px;
    border: 6px solid black;
    padding: 50px;
    margin: 20px;
    border-radius: 20%;
    background: #bfdeff;
    box-shadow: 10px 10px 5px;
}

.flex {
    display: flex;
}



.textInfo {
    display: flex;
    align-items: flex-end;
    justify-content: start;
}

span {
    padding-left: 10px;
    font-size: 24px;

}

.tempDegree {
    justify-content: space-around;
    align-items: center;
}

.textFont {
    font-family: 'Roboto Condensed', sans-serif;
    font-size: 30px;
    -webkit-box-reflect: below .5px linear-gradient(to bottom, rgba(0, 0, 0, 0.0), rgba(0, 0, 0, 0.2));
}

.textFonts {
    font-family: 'Roboto Condensed', sans-serif;
    font-size: 80px;
    text-shadow: 2px 2px 5px #555;
    color: white;
}

img {
    width: 150px;

}


/* CSS */
.button-29 {
    align-items: center;
    appearance: none;
    background-image: radial-gradient(100% 100% at 100% 0, #5adaff 0, #5468ff 100%);
    border: 0;
    border-radius: 6px;
    box-shadow: rgba(45, 35, 66, .4) 0 2px 4px, rgba(45, 35, 66, .3) 0 7px 13px -3px, rgba(58, 65, 111, .5) 0 -3px 0 inset;
    box-sizing: border-box;
    color: #fff;
    cursor: pointer;
    display: inline-flex;
    font-family: "JetBrains Mono", monospace;
    height: 48px;
    justify-content: center;
    line-height: 1;
    list-style: none;
    overflow: hidden;
    padding-left: 16px;
    padding-right: 16px;
    position: relative;
    text-align: left;
    text-decoration: none;
    transition: box-shadow .15s, transform .15s;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
    white-space: nowrap;
    will-change: box-shadow, transform;
    font-size: 18px;
}

.button-29:focus {
    box-shadow: #3c4fe0 0 0 0 1.5px inset, rgba(45, 35, 66, .4) 0 2px 4px, rgba(45, 35, 66, .3) 0 7px 13px -3px, #3c4fe0 0 -3px 0 inset;
}

.button-29:hover {
    box-shadow: rgba(45, 35, 66, .4) 0 4px 8px, rgba(45, 35, 66, .3) 0 7px 13px -3px, #3c4fe0 0 -3px 0 inset;
    transform: translateY(-2px);
}

.button-29:active {
    box-shadow: #3c4fe0 0 3px 7px inset;
    transform: translateY(2px);

    <body>
        <h1>Your local Weather</h1>
        <div class="container ">

            <div class="mainInterface">
                <div class="weather-icon">
                    <img src="http://openweathermap.org/img/wn/10d@2x.png">
                </div>
                <div class="tempDegree flex">
                    <div class="temp flex">
                        <span class="degree  textFonts">--</span><br>
                        <span class="fanCel textFonts">-</span>
                    </div>
                    <div class="fanCelToggleButton">
                        <button class="toFar button-29" role="button">F</button>
                        <button class="toCel button-29" role="button">C</button>
                    </div>
                </div>
                <br>
                <div class="textInfo">
                    <div class="location">
                        <p class="textFont">Weather in<span class="status textFont"></span></p>
                    </div>
                    <div class="">
                        <span class="locationAPI"></span>
                    </div>
                </div>

            </div>
        </div>

        <script src="script.js"></script>
    
<script>
/*__POPCODESTART__*/
var units = 'imperial'; //initailize the unit of measurement for open weather map API

var uOfm = 'F'; //set the unit of measurment for the page 
//

function getWeatherAndLocation(unit, fandc) {
  var status = document.querySelector('.status');
  var iconElement = document.querySelector('.weather-icon');
  var degree = document.querySelector('.degree');
  var fanCel = document.querySelector('.fanCel');

  var success = function success(position) {
    //retruns the users location and fetch the data from the location and weather API
    console.log(position);
    var latitude = position.coords.latitude; // constant for the latitude  coordinates 

    var longitude = position.coords.longitude; //constant for the longitude coordinates 

    console.log('long:' + longitude + ' lat:' + latitude); // check the console to make sure it worked

    units = unit; //get the users locations and sets it on the page

    fetch('https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${latitude}&longitude=${longitude}X&localityLanguage=en').then(function (res) {
      return res.json();
    }).then(function (data) {
      console.log(data);
      status.textContent = data.locality + ", " + data.principalSubdivision;
    }); //get the weather using user's location and sets it on the page

    fetch('https://api.openweathermap.org/data/2.5/weather?lat=' + latitude + '&lon=' + longitude + '&units=' + units + '&appid=b989a956b784b1493fe08339165f3739').then(function (res) {
      return res.json();
    }).then(function (data) {
      console.log(data);
      degree.textContent = Math.trunc(data.main.temp) + '°';
      fanCel.textContent = fandc;
      iconElement.innerHTML = "<img src=\"http://openweathermap.org/img/wn/".concat(data.weather[0].icon, "@2x.png\"/>");
    });
  };

  var error = function error() {
    // returns only if the user does not allow location service. 
    status.textContent = "unable to fulfill request";
  };

  navigator.geolocation.getCurrentPosition(success, error); //gets the user long and lat if successful or let the user know that it can if error
} //event listener that runs the function when the page loads.


document.querySelector('.weather-icon').addEventListener('click', getWeatherAndLocation(units, uOfm)); //set the unit of mesurment to metric

document.querySelector('.toCel').onclick = function () {
  getWeatherAndLocation('metric', 'C');
}; //set the unit of measurment to imperial (the dark side)


document.querySelector('.toFar').onclick = function () {
  getWeatherAndLocation('imperial', 'F');
};
